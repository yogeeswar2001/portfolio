name: Sync Resume from Overleaf

on:
  push:
    paths:
      - 'resume.pdf'   # only runs when you push a new resume.pdf
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber

      # ── Parse PDF → resume.json ────────────────────────────────────────
      - name: Parse PDF into resume.json
        run: python scripts/parse_resume.py

      # ── Commit updated resume.json ─────────────────────────────────────
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.json
          git diff --cached --quiet || git commit -m "chore: sync resume and redeploy"
          git push
