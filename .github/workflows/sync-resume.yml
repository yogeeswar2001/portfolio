name: Sync Resume from Overleaf

on:
  schedule:
    - cron: '0 3 * * *'   # nightly at 3am UTC
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber requests

      - name: Download PDF from Overleaf
        env:
          OVERLEAF_PDF_URL: ${{ secrets.OVERLEAF_PDF_URL }}
        run: |
          python - <<'EOF'
          import os, requests, hashlib, sys
          
          url = os.environ["OVERLEAF_PDF_URL"]
          # We add a User-Agent header to pretend we are a Chrome browser
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          
          try:
              r = requests.get(url, headers=headers, timeout=30)
              r.raise_for_status()
              new_pdf = r.content
              
              # ... rest of your hashing logic ...
              hash_file = ".resume_hash"
              new_hash = hashlib.sha256(new_pdf).hexdigest()
              
              if os.path.exists(hash_file) and open(hash_file).read().strip() == new_hash:
                  print("PDF unchanged, skipping update.")
                  sys.exit(0)
          
              with open("resume.pdf", "wb") as f:
                  f.write(new_pdf)
              with open(hash_file, "w") as f:
                  f.write(new_hash)
              print("PDF updated successfully!")
          
          except requests.exceptions.HTTPError as e:
              print(f"Error: {e}")
              sys.exit(1)
          EOF

      - name: Parse PDF → resume.json
        run: python scripts/parse_resume.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.json .resume_hash
          git diff --cached --quiet || git commit -m "chore: sync resume from Overleaf"
          git push
